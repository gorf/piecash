name: CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres_password_CI
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:latest
        ports:
          - 3306:3306
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
#          MYSQL_USER: gha_user
          MYSQL_ROOT_PASSWORD: root
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    strategy:
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set fr locale
      run: |
        sudo locale-gen fr_FR.UTF-8
        sudo update-locale LANG=fr_FR.UTF-8
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install -e ".[test,ledger]"
#    - name: Lint with flake8
#      run: |
#        flake8
    - name: Test with pytest
      env:
        LC_ALL: fr_FR.UTF-8
      run: |
        pytest tests/ -v
    - name: Coverage
      env:
        LC_ALL: fr_FR.UTF-8
      run: |
        coverage run --source=piecash -m pytest tests/
    - name: Upload coverage data to coveralls.io
      # May fail on forks without COVERALLS_REPO_TOKEN; tests still pass
      continue-on-error: true
      run: |
        python -m pip install coveralls==3.3.1
        coveralls --service=github
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
